name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - tests/contracts/**
      - .github/workflows/backend-ci.yml
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - tests/contracts/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-validate:
    name: Build, Vet, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: group_events_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d group_events_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        shell: bash
        working-directory: backend
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/group_events_test?sslmode=disable
      GOFLAGS: -buildvcs=false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Download modules
        run: go mod download

      - name: Build backend
        run: go build ./...

      - name: Vet backend
        run: go vet ./...

      - name: Test backend
        run: go test -race ./...